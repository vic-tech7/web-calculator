<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VEC Scientific Web Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="history-panel" class="history-panel">

<div class="history-header">
<h2>Calculation History</h2>
<button onclick="clearHistoryUI()">Clear History</button>
</div>

<ul id="history-list"></ul>

<div class="utility-section">

<h3>Utilities</h3>

<button class="util-btn" onclick="openUnitConverter()">Unit Converter</button>

<button class="util-btn" onclick="openProgrammerMode()">Programmer Mode</button>

<button class="util-btn" onclick="openAISecurityAssistant()">AI Assistant</button>

<button class="util-btn" onclick="generateShareLink()">Share Calculation</button>

<button class="util-btn" onclick="changeBackground()">Dynamic Wallpaper</button>

</div>
</div>


<div class="main-content">

<button id="menu-button" onclick="toggleHistoryPanel()">☰</button>

<header>
<h1>VEC Scientific Web Calculator</h1>
<p>How is my first calculator? Now SCIENTIFIC!</p>
<p><em>Created by CHAD</em></p>
</header>

<div class="calculator">

<input type="text" id="display" disabled>

<div class="buttons">

<button onclick="clearDisplay()">AC</button>
<button onclick="deleteLast()">⌫</button>
<button onclick="appendToDisplay('/')">/</button>
<button onclick="appendToDisplay('*')">×</button>

<button onclick="appendToDisplay('7')">7</button>
<button onclick="appendToDisplay('8')">8</button>
<button onclick="appendToDisplay('9')">9</button>
<button onclick="appendToDisplay('-')">-</button>

<button onclick="appendToDisplay('4')">4</button>
<button onclick="appendToDisplay('5')">5</button>
<button onclick="appendToDisplay('6')">6</button>
<button onclick="appendToDisplay('+')">+</button>

<button onclick="appendToDisplay('1')">1</button>
<button onclick="appendToDisplay('2')">2</button>
<button onclick="appendToDisplay('3')">3</button>
<button onclick="calculate()">=</button>

<button onclick="appendToDisplay('0')">0</button>
<button onclick="appendToDisplay('.')">.</button>
<button onclick="calculateAdvanced('sqrt')">√</button>
<button onclick="calculateAdvanced('sin')">sin</button>

</div>

</div>
</div>


<div id="programmer-overlay" class="overlay">
<div class="overlay-content">

<h2>Programmer Mode</h2>

<input type="number" id="dec-input" value="0" oninput="convertBases()">

<p>Binary: <span id="bin-output">0</span></p>

<p>Hexadecimal: <span id="hex-output">0x0</span></p>

<button onclick="closeProgrammerMode()">Close</button>

</div>
</div>


<div id="unit-converter-overlay" class="overlay">
<div class="overlay-content">

<h2>Unit Converter</h2>

<input type="number" id="input-value" value="1" oninput="convertUnits()">

<p>Meters: <span id="output-meters"></span></p>

<p>Feet: <span id="output-feet"></span></p>

<p>Kilometers: <span id="output-kilometers"></span></p>

<p>Miles: <span id="output-miles"></span></p>

<button onclick="closeUnitConverter()">Close</button>

</div>
</div>


<div id="ai-chat-overlay" class="overlay">
<div class="overlay-content">

<h2>VEC AI Assistant</h2>

<div id="ai-chat-messages"></div>

<textarea id="ai-user-input"></textarea>

<button onclick="sendAIQuery()">Send</button>

<button onclick="closeAIChat()">Close</button>

</div>
</div>

<script src="script.js"></script>

</body>
</html>
